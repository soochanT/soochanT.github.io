<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>생물 분류 수박게임 (Next 표시 추가)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            align-items: center;
            background-color: #f5f5dc; 
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
            touch-action: none;
            width: 100vw; height: 100vh;
        }
        h1 { color: #5d4037; margin: 10px 0 2px 0; font-size: 18px; text-align: center; }
        .creator { font-size: 12px; color: #795548; margin-bottom: 5px; font-weight: bold; }
        .score { font-size: 18px; font-weight: bold; color: #795548; margin-bottom: 5px; }
        
        #game-wrapper {
            display: flex; align-items: flex-start; gap: 5px;
            width: 100%; max-width: 400px; justify-content: center;
            padding: 0 10px;
        }

        .side-legend {
            display: flex; flex-direction: column; gap: 3px;
            background: rgba(255, 255, 255, 0.7); padding: 8px 5px;
            border-radius: 8px; border: 1px solid #d7ccc8;
        }
        .legend-item {
            display: flex; align-items: center; gap: 4px;
            font-size: 10px; font-weight: bold; color: #3e2723;
        }
        .color-circle {
            width: 10px; height: 10px; border-radius: 50%;
        }

        #game-container { 
            position: relative; width: 280px; height: 480px;
            background: #ffffff; border: 4px solid #8d6e63; 
            border-bottom-width: 12px; border-radius: 0 0 10px 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            overflow: hidden;
        }
        canvas { display: block; width: 100% !important; height: 100% !important; }

        /* Next 미리보기 UI 추가 */
        #next-preview {
            position: absolute; top: 10px; right: 10px;
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #8d6e63; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }
        #next-preview .label { font-size: 10px; color: #8d6e63; font-weight: bold; margin-bottom: 2px; }
        #next-circle { width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; font-weight: bold; }

        #game-over {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75);
            z-index: 100; flex-direction: column; justify-content: center;
            align-items: center; color: white; text-align: center;
        }
        .retry-btn {
            background-color: #8d6e63; color: white; border: none;
            padding: 12px 24px; border-radius: 5px; cursor: pointer;
            margin-top: 20px; font-size: 16px; font-weight: bold;
        }

        .info { margin-top: 8px; color: #5d4037; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>생물 분류 수박게임</h1>
    <div class="creator">제작자: 수찬T</div>
    <div class="score">점수: <span id="score">0</span></div>
    
    <div id="game-wrapper">
        <div class="side-legend" id="side-legend"></div>
        <div id="game-container">
            <div id="next-preview">
                <div class="label">NEXT</div>
                <div id="next-circle"></div>
            </div>
            
            <div id="game-over">
                <h2 style="font-size: 28px; margin: 0;">GAME OVER</h2>
                <p id="final-stats" style="margin: 15px 0; font-size: 14px;"></p>
                <button class="retry-btn" onclick="location.reload()">다시 시작</button>
            </div>
        </div>
    </div>

    <div class="info">좌우로 드래그한 후 손을 떼서 떨어뜨리세요!</div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;

        const STAGES = [
            { label: "종", size: 14, color: "#4db6ac" },
            { label: "속", size: 22, color: "#4fc3f7" },
            { label: "과", size: 32, color: "#7986cb" },
            { label: "목", size: 44, color: "#9575cd" },
            { label: "강", size: 58, color: "#f06292" },
            { label: "문", size: 72, color: "#a1887f" },
            { label: "계", size: 90, color: "#90a4ae" }
        ];

        const legendContainer = document.getElementById('side-legend');
        STAGES.slice().reverse().forEach(stage => {
            const div = document.createElement('div');
            div.className = 'legend-item';
            const circle = document.createElement('div');
            circle.className = 'color-circle';
            circle.style.backgroundColor = stage.color;
            const textSpan = document.createElement('span');
            textSpan.innerText = stage.label;
            div.appendChild(circle);
            div.appendChild(textSpan);
            legendContainer.appendChild(div);
        });

        let score = 0;
        let currentBody = null;
        let nextIndex = Math.floor(Math.random() * 3); // 다음 나올 타일 미리 결정
        let canShoot = true;
        let isGameOver = false;
        let deadlineY = 90; 
        let deadlineTimer = null;

        const container = document.getElementById("game-container");
        const width = 280;
        const height = 480;

        const engine = Engine.create();
        const render = Render.create({
            element: container,
            engine: engine,
            options: {
                width: width, height: height,
                wireframes: false,
                background: '#ffffff',
                pixelRatio: window.devicePixelRatio
            }
        });

        const ground = Bodies.rectangle(width/2, height + 20, width, 60, { isStatic: true, render: { fillStyle: '#8d6e63' } });
        const leftWall = Bodies.rectangle(-10, height/2, 20, height, { isStatic: true });
        const rightWall = Bodies.rectangle(width + 10, height/2, 20, height, { isStatic: true });
        Composite.add(engine.world, [ground, leftWall, rightWall]);

        function updateNextPreview() {
            const nextCircle = document.getElementById("next-circle");
            const stage = STAGES[nextIndex];
            nextCircle.style.backgroundColor = stage.color;
            nextCircle.innerText = stage.label;
        }

        function createStage(x, y, index) {
            const stage = STAGES[index];
            return Bodies.circle(x, y, stage.size, {
                index: index,
                restitution: 0.3,
                friction: 0.1,
                render: { fillStyle: stage.color }
            });
        }

        function spawnNewStage() {
            if (currentBody || isGameOver) return;
            
            // 미리 결정된 nextIndex로 현재 타일 생성
            currentBody = createStage(width/2, 40, nextIndex);
            currentBody.isStatic = true;
            Composite.add(engine.world, currentBody);
            
            // 다음 타일 미리 결정 (0~2단계 중 하나)
            nextIndex = Math.floor(Math.random() * 3);
            updateNextPreview();
            
            canShoot = true;
        }

        function handleInput(e) {
            if (isGameOver) return;
            if (e.cancelable) e.preventDefault();

            const rect = container.getBoundingClientRect();
            let clientX;
            if (e.type.startsWith('touch')) {
                clientX = e.touches[0] ? e.touches[0].clientX : e.changedTouches[0].clientX;
            } else {
                clientX = e.clientX;
            }

            let x = (clientX - rect.left) * (width / rect.width);
            if (currentBody && canShoot) {
                const radius = STAGES[currentBody.index].size;
                if (x < radius) x = radius;
                if (x > width - radius) x = width - radius;
                Body.setPosition(currentBody, { x: x, y: 40 });
            }

            if (e.type === 'mouseup' || e.type === 'touchend') {
                if (currentBody && canShoot) {
                    currentBody.isStatic = false;
                    currentBody = null;
                    canShoot = false;
                    setTimeout(spawnNewStage, 800); 
                }
            }
        }

        container.addEventListener("mousedown", handleInput);
        container.addEventListener("mousemove", handleInput);
        window.addEventListener("mouseup", handleInput);
        container.addEventListener("touchstart", handleInput, {passive: false});
        container.addEventListener("touchmove", handleInput, {passive: false});
        container.addEventListener("touchend", handleInput, {passive: false});

        Events.on(engine, "collisionStart", (event) => {
            event.pairs.forEach((pair) => {
                const { bodyA, bodyB } = pair;
                if (bodyA.index !== undefined && bodyA.index === bodyB.index && bodyA.index < STAGES.length - 1) {
                    const newIndex = bodyA.index + 1;
                    const midX = (bodyA.position.x + bodyB.position.x) / 2;
                    const midY = (bodyA.position.y + bodyB.position.y) / 2;

                    Composite.remove(engine.world, [bodyA, bodyB]);
                    const newBody = createStage(midX, midY, newIndex);
                    Composite.add(engine.world, newBody);

                    score += (newIndex + 1) * 10;
                    document.getElementById("score").innerText = score;
                }
            });
        });

        Events.on(engine, "afterUpdate", () => {
            if (isGameOver) return;
            let overLine = false;
            const bodies = Composite.allBodies(engine.world);
            for (let body of bodies) {
                if (body.isStatic || body.index === undefined) continue;
                if (body.position.y - STAGES[body.index].size < deadlineY) {
                    overLine = true;
                    break;
                }
            }
            if (overLine) {
                if (!deadlineTimer) {
                    deadlineTimer = setTimeout(() => { gameOver(); }, 3000);
                }
            } else {
                clearTimeout(deadlineTimer);
                deadlineTimer = null;
            }
        });

        function gameOver() {
            isGameOver = true;
            let maxVal = 0;
            Composite.allBodies(engine.world).forEach(b => {
                if(b.index !== undefined && b.index > maxVal) maxVal = b.index;
            });
            const stats = document.getElementById("final-stats");
            stats.innerHTML = `최종 점수: ${score}점<br>최고 단계: ${STAGES[maxVal].label}`;
            document.getElementById("game-over").style.display = "flex";
        }

        Events.on(render, "afterRender", () => {
            const context = render.context;
            context.beginPath();
            context.setLineDash([5, 5]);
            context.moveTo(0, deadlineY);
            context.lineTo(width, deadlineY);
            context.strokeStyle = deadlineTimer ? "red" : "rgba(215, 204, 200, 0.5)";
            context.lineWidth = 2;
            context.stroke();
            context.setLineDash([]);

            context.font = "bold 12px Malgun Gothic";
            context.textAlign = "center";
            context.textBaseline = "middle";

            Composite.allBodies(engine.world).forEach(body => {
                if (body.index !== undefined) {
                    context.fillStyle = "#ffffff";
                    context.fillText(STAGES[body.index].label, body.position.x, body.position.y);
                }
            });
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);
        updateNextPreview(); // 초기 미리보기 업데이트
        spawnNewStage();
    </script>
</body>
</html>
